name: Databricks Pipeline CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────────
  # JOB 1: Run Tests
  # ─────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run schema validation tests
        run: pytest tests/test_schema.py -v

      - name: Run transformation tests
        run: pytest tests/test_transformation.py -v

  # ─────────────────────────────────────────
  # JOB 2: Deploy to Databricks
  # Only runs if Job 1 (tests) passes
  # ─────────────────────────────────────────
  deploy:
    name: Deploy Notebooks to Databricks
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Databricks CLI
        run: pip install databricks-cli

      - name: Deploy notebooks to Databricks
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          WORKSPACE_PATH="/Users/charithasreesakhamuri@gmail.com/Charitha_DB"

          databricks workspace import notebooks/01_ingestion.py \
            ${WORKSPACE_PATH}/01_ingestion -l PYTHON -o

          databricks workspace import notebooks/02_transformation.py \
            ${WORKSPACE_PATH}/02_transformation -l PYTHON -o

          databricks workspace import notebooks/03_aggregation.py \
            ${WORKSPACE_PATH}/03_aggregation -l PYTHON -o

          databricks workspace import notebooks/04_reporting.py \
            ${WORKSPACE_PATH}/04_reporting -l PYTHON -o

          echo "All notebooks deployed successfully."
